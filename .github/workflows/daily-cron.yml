name: Apostas LoL — daily cron

# Roda todo dia 09:00 BRT (12:00 UTC).
# Execução é idempotente: roda TODOS os jobs sem gating de hora.
# Free tier do GitHub Actions tem delay variável (5min a 1h+); por isso
# nunca confiamos em hora exata pra decidir o que rodar.
# Janela 12:00 UTC dá ~3h de folga até 1º jogo LEC/CBLOL (15h UTC = 12h BRT).
# Fair Pinnacle manual é entregue pelo Elvis antes dos jogos via /log-fair.
# Cron 03:30 BRT foi descontinuado em 2026-05-23 junto com Polymarket.
on:
  schedule:
    - cron: '0 12 * * *'    # 09:00 BRT — único cron diário (desde 2026-05-23)
  workflow_dispatch: {}

jobs:
  cron:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_URL: https://yxhpopkxlupdpqkdaffg.supabase.co
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Captura fair lines via fórmula (blueAvgTotal+redAvgTotal)/2.
      # Polymarket descontinuado em 2026-05-23 — fair Pinnacle manual via /log-fair.
      # Cada bloco é idempotente (skipa eventos já completed). Em weekdays, lec/cblol = 0.
      - name: Capture fair lines (LCK + LPL)
        run: node .claude/scripts/capture_fair_lines.cjs lck,lpl
        continue-on-error: true

      - name: Capture fair lines (LEC + CBLOL)
        run: node .claude/scripts/capture_fair_lines.cjs lec,cblol
        continue-on-error: true

      # Analisa ontem (sempre)
      - name: Analyze yesterday's games
        run: node .claude/scripts/analyze_yesterday.cjs
        continue-on-error: true

      # Analisa hoje também — pega jogos da manhã que já completaram
      # (importante na execução das 14:00 UTC quando LCK/LPL da manhã já fecharam)
      - name: Analyze today's games (best-effort)
        run: node .claude/scripts/analyze_yesterday.cjs $(date -u +%Y-%m-%d)
        continue-on-error: true

      # Salva relatório dos triggered maps no Supabase (ontem + hoje)
      - name: Save report — yesterday
        if: env.SUPABASE_SECRET_KEY != ''
        run: node .claude/scripts/save_report_to_db.cjs $(date -u -d 'yesterday' +%Y-%m-%d)
        continue-on-error: true

      - name: Save report — today
        if: env.SUPABASE_SECRET_KEY != ''
        run: node .claude/scripts/save_report_to_db.cjs $(date -u +%Y-%m-%d)
        continue-on-error: true

      # Rebuild dashboard stats (Split 2 only)
      - name: Rebuild dashboard stats
        run: node .claude/scripts/rebuild_dashboard_stats_cron.cjs
        continue-on-error: true

      # Build dados da aba "Método Milio" (todos os jogos do Milio nos results.json).
      # Roda DEPOIS do analyze (que gera os results.json do dia). Audit 2026-05-31.
      - name: Build Milio dashboard data
        run: node .claude/scripts/build_milio_dashboard_data.cjs
        continue-on-error: true

      # Rebuild LFL dashboard stats (standalone, antes só rodava manual — adicionado 2026-05-25)
      - name: Rebuild LFL dashboard stats
        run: node .claude/scripts/rebuild_lfl_dashboard_stats.cjs
        continue-on-error: true

      # Compute real bets method stats (aplicando regra Bardo só LEC) — pra dashboard frontend
      - name: Compute real bets method stats
        if: env.SUPABASE_SECRET_KEY != ''
        run: node .claude/scripts/compute_real_bets_method.cjs
        continue-on-error: true

      # Tier 2 EU analysis (LFL/LES/LIT/EMEA Masters etc) — split 2 inteiro, standalone
      # Roda todo dia mas só atualiza se há novos games (idempotente).
      # Importante pra Qua/Qui (dias que essas ligas jogam, antes das 12h BRT)
      - name: Analyze Tier 2 EU (LFL/LES/LIT)
        run: node .claude/scripts/analyze_tier2_eu.cjs
        continue-on-error: true

      # Export snapshot diário do banco pra backup em cron-data/snapshots/
      - name: Export bets snapshot
        if: env.SUPABASE_SECRET_KEY != ''
        run: node .claude/scripts/export-bets-snapshot.cjs
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cron-data/
          if git diff --cached --quiet; then
            echo "Nada novo pra commitar"
          else
            git commit -m "cron: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
