name: Apostas LoL — daily cron

# Roda todo dia 03:30 BRT (06:30 UTC) e 09:00 BRT (12:00 UTC).
# Cada execução é idempotente: roda TODOS os jobs sem gating de hora.
# Free tier do GitHub Actions tem delay variável (5min a 1h+); por isso
# nunca confiamos em hora exata pra decidir o que rodar.
# Janela 12:00 UTC dá ~3h de folga até 1º jogo LEC/CBLOL (15h UTC = 12h BRT)
# pra capturar Polymarket Total Kills pré-jogo (linha abre ~24h antes).
on:
  schedule:
    - cron: '30 6 * * *'    # 03:30 BRT — captura LCK+LPL pré-jogo + analisa ontem
    - cron: '0 12 * * *'    # 09:00 BRT — captura LEC+CBLOL pré-jogo (sábado/domingo)
  workflow_dispatch: {}

jobs:
  cron:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Capture Polymarket Total Kills lines (pré-jogo) — runner US/EU sem geo-block.
      # Mercados de Total Kills no Polymarket abrem ~24h antes do jogo. O cron precisa
      # rodar dentro dessa janela. Resultado vai pra cron-data/{date}-polymarket-lines.json
      # e é consumido como fonte primária pelo analyze_range + rebuild_dashboard.
      - name: Capture Polymarket Total Kills lines
        run: node capture_polymarket_lines.cjs
        continue-on-error: true

      # Capture fair lines (legacy do bookmaker pré-jogo) — ambos blocos rodam sempre.
      # Cada bloco é idempotente (skipa eventos já completed). Em weekdays, lec/cblol = 0.
      - name: Capture fair lines (LCK + LPL)
        run: node capture_fair_lines.cjs lck,lpl
        continue-on-error: true

      - name: Capture fair lines (LEC + CBLOL)
        run: node capture_fair_lines.cjs lec,cblol
        continue-on-error: true

      # Analisa ontem (sempre)
      - name: Analyze yesterday's games
        run: node analyze_yesterday.cjs
        continue-on-error: true

      # Analisa hoje também — pega jogos da manhã que já completaram
      # (importante na execução das 14:00 UTC quando LCK/LPL da manhã já fecharam)
      - name: Analyze today's games (best-effort)
        run: node analyze_yesterday.cjs $(date -u +%Y-%m-%d)
        continue-on-error: true

      # Salva relatório dos triggered maps no Supabase (ontem + hoje)
      - name: Save report — yesterday
        if: env.SUPABASE_SECRET_KEY != ''
        run: node save_report_to_db.cjs $(date -u -d 'yesterday' +%Y-%m-%d)
        continue-on-error: true

      - name: Save report — today
        if: env.SUPABASE_SECRET_KEY != ''
        run: node save_report_to_db.cjs $(date -u +%Y-%m-%d)
        continue-on-error: true

      # Rebuild dashboard stats (Split 2 only)
      - name: Rebuild dashboard stats
        run: node rebuild_dashboard_stats_cron.cjs
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cron-data/
          if git diff --cached --quiet; then
            echo "Nada novo pra commitar"
          else
            git commit -m "cron: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
